<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPulse Forex Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div style="font-weight: 800; font-size: 1.2rem; color: #4361ee;">
            <i class="fas fa-chart-line"></i> DATAPULSE
        </div>
        <div>
            <a href="/" style="margin-right: 20px; text-decoration: none; color: #666; font-weight: 500;">Home</a>
            <a href="/dashboard" style="text-decoration: none; color: #666; font-weight: 500;">Intelligence Hub</a>
        </div>
    </nav>

    <div style="padding: 20px;">
        {% block content %}
        {% endblock %}
    </div>

    <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: var(--primary);">
        <i class="fas fa-satellite-dish fa-spin" style="font-size: 3rem; margin-bottom: 1rem;"></i>
        <h2 style="font-family: var(--font-display);">Synchronizing Intelligence...</h2>
        <p style="color: var(--text-dim);">Analyzing global economic data streams</p>
    </div>

    <script>
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', () => {
                document.getElementById('loading-overlay').style.display = 'flex';
            });
        });
    </script>
</body>
</html>
